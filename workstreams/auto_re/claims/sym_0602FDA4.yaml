# Throttle/gear input handler — FIRST pipeline call. Reads g_pad_state+2,
# writes car[+0xDE] (button state 0-3). The missing link in the throttle pipeline.
# +0xDE is 16-bit (mov.w) — invisible to watchpoints.

claims:
