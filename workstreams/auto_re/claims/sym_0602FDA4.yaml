    type: call_count_per_frame
    description: "sym_0602FDA4 (throttle input handler) fires ~1x per frame (pipeline call 1)"
    function: sym_0602FDA4
    address: 0x0602FDA4
    scenario: straight_throttle
    expected_count: 2
    tolerance: 1

  - id: speed_increases_throttle
    type: value_changes_with_input
    description: "Speed (car[+0x0C]) increases when C is held — this function reads g_pad_state"
    address: 0x0607890C
    input: C
    direction: increases
    frames: 60

  - id: position_decreases_throttle
    type: value_changes_with_input
    description: "Position X (car[+0x10]) decreases when C is held — pipeline validation"
    address: 0x06078910
    input: C
    direction: decreases
